# deny.toml — place in repo root
# Docs: https://embarkstudios.github.io/cargo-deny/
# Migrated to cargo-deny v2 schema (removed deprecated keys)

[graph]
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-pc-windows-msvc",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]
all-features = true

# ── Advisories (CVE / RUSTSEC) ────────────────────────────────
[advisories]
version = 2
unmaintained = "workspace"     # fail if first-party deps are abandoned; warn on deep transitive informational advisories
unsound = "workspace"          # keep actionable direct unsound advisories failing without breaking on ratatui's MSRV-bound lru
ignore = []                   # e.g. ["RUSTSEC-2024-XXXX"]

# ── Licenses ──────────────────────────────────────────────────
# In cargo-deny v2, all licenses are denied unless explicitly allowed.
# Removed deprecated keys: unlicensed, copyleft, deny, default.
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "MIT-0",
    "OpenSSL",
    "MPL-2.0",
]
confidence-threshold = 0.8

# Ignore license checks for our own unpublished workspace crates
[licenses.private]
ignore = true

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
crate = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

# ── Bans ──────────────────────────────────────────────────────
[bans]
multiple-versions = "warn"
wildcards = "deny"              # prevent `*` version specs
allow-wildcard-paths = true     # private workspace path deps do not carry registry versions
highlight = "all"

deny = [
    # Force pure-Rust TLS via rustls — ban OpenSSL C bindings
    { crate = "openssl", use-instead = "rustls" },
    { crate = "openssl-sys", use-instead = "rustls" },
    # Ban known-problematic crates
    { crate = "cmake" },
]

skip = []
skip-tree = []

# ── Sources ───────────────────────────────────────────────────
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
